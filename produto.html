<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<title>Produto — Bicalhos Jóias</title>
<meta name="description" content="Joia artesanal Bicalhos Jóias — Alianças de moedas antigas personalizadas."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#B8960C;--gold-light:#E8D48B;--gold-dark:#8A6E08;--cream:#FAF7F2;--dark:#1A1612;--mid:#4A3F35;--muted:#8C7B6E;--border:rgba(184,150,12,0.25);--white:#FFFFFF;--radius:4px;--shadow:0 4px 24px rgba(26,22,18,0.12)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Jost",sans-serif;background:var(--cream);color:var(--dark);min-height:100vh}
header{position:sticky;top:0;z-index:100;background:rgba(250,247,242,0.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo-wrap{display:flex;align-items:center;gap:0.6rem;text-decoration:none}
.logo-img{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0}
.logo-text{font-family:"Cormorant Garamond",serif;font-size:1.4rem;font-weight:600;color:var(--gold-dark);letter-spacing:0.04em}
.logo-text span{font-style:italic;font-weight:300}
nav a{font-size:0.8rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--mid);text-decoration:none;transition:color 0.2s;margin-left:1.5rem}
nav a:hover{color:var(--gold)}
.back-link{font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;margin-bottom:2rem;transition:color 0.2s}
.back-link:hover{color:var(--gold)}
.product-page{max-width:900px;margin:0 auto;padding:3rem 2rem}
.product-layout{display:flex;gap:3rem;align-items:flex-start}
.product-image-wrap{flex:1;background:#F5EFE6;border:1px solid var(--border);border-radius:2px;overflow:hidden}
.product-image-wrap img{width:100%;height:auto;display:block}
.product-details{flex:1}
.product-material{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem}
.product-title{font-family:"Cormorant Garamond",serif;font-size:2rem;font-weight:300;line-height:1.2;color:var(--dark);margin-bottom:0.75rem}
.product-desc{font-size:0.9rem;color:var(--muted);line-height:1.7;margin-bottom:1.5rem}
.product-price{font-family:"Cormorant Garamond",serif;font-size:1.8rem;font-weight:400;color:var(--gold-dark);margin-bottom:2rem}
.btn-whatsapp{background:#25D366;color:white;border:none;padding:0.85rem 2rem;border-radius:var(--radius);font-family:"Jost",sans-serif;font-size:0.85rem;letter-spacing:0.08em;cursor:pointer;display:inline-flex;align-items:center;gap:0.5rem;transition:background 0.2s;text-decoration:none}
.btn-whatsapp:hover{background:#1EAF55}
.not-found{text-align:center;padding:6rem 2rem}
.not-found h2{font-family:"Cormorant Garamond",serif;font-size:2rem;font-weight:300;margin-bottom:1rem}
.not-found a{color:var(--gold);text-decoration:underline}
footer{background:var(--dark);color:rgba(255,255,255,0.5);text-align:center;padding:2rem;font-size:0.78rem;letter-spacing:0.08em;margin-top:4rem}
footer a{color:var(--gold-light);text-decoration:none}
@media(max-width:640px){
.product-layout{flex-direction:column}
.product-page{padding:2rem 1rem}
nav a{display:none}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo-wrap">
    <img src="https://raw.github.com/Bicalhos/bicalhos-joias/main/logotipo2.jpeg" alt="Bicalhos Jóias" class="logo-img"/>
    <span class="logo-text">Bicalhos <span>Jóias</span></span>
